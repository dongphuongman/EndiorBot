<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EndiorBot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#252830;--border:#2e3140;--text:#e4e4e7;--text2:#a1a1aa;--primary:#6366f1;--primary-hover:#818cf8;--error:#ef4444;--success:#22c55e;--code-bg:#1e2030}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.header h1{font-size:18px;font-weight:600}
.logo{display:flex;align-items:center;gap:8px}
.logo svg{width:24px;height:24px}
.tabs{display:flex;gap:4px}
.tab{padding:6px 16px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:6px;font-size:14px}
.tab.active{background:var(--primary);color:#fff}
.tab:hover:not(.active){background:var(--surface2)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.status-dot.connected{background:var(--success)}
.status-dot.disconnected{background:var(--error)}
.panel{flex:1;display:none;flex-direction:column;overflow:hidden}
.panel.active{display:flex}
/* Auth */
.auth-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:360px;max-width:90vw}
.auth-box h2{margin-bottom:8px;font-size:20px}
.auth-box p{color:var(--text2);margin-bottom:20px;font-size:14px}
.auth-box input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:14px;margin-bottom:12px}
.auth-box input:focus{outline:none;border-color:var(--primary)}
.auth-box button{width:100%;padding:10px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-size:14px;cursor:pointer;font-weight:500}
.auth-box button:hover{background:var(--primary-hover)}
.auth-error{color:var(--error);font-size:13px;margin-bottom:8px;display:none}
/* Chat */
.messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:var(--surface2);border-bottom-left-radius:4px}
.msg.system{align-self:center;background:var(--surface);color:var(--text2);font-size:12px;padding:6px 12px}
.msg strong{font-weight:600}
.msg code{background:var(--code-bg);padding:1px 5px;border-radius:3px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px}
.msg pre{background:var(--code-bg);padding:10px 12px;border-radius:6px;overflow-x:auto;margin:6px 0}
.msg pre code{background:none;padding:0}
.msg li{margin-left:18px}
.typing{align-self:flex-start;color:var(--text2);font-size:13px;padding:4px 0;display:none}
.input-area{padding:12px 20px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px;align-items:flex-end}
.input-area textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:14px;font-family:inherit;resize:none;min-height:42px;max-height:120px;line-height:1.4}
.input-area textarea:focus{outline:none;border-color:var(--primary)}
.input-area button{padding:10px 20px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-size:14px;cursor:pointer;font-weight:500;white-space:nowrap}
.input-area button:hover{background:var(--primary-hover)}
.input-area button:disabled{opacity:.5;cursor:not-allowed}
/* Dashboard */
.dashboard{padding:20px;overflow-y:auto}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.dash-card h3{font-size:12px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;letter-spacing:.5px}
.dash-card .value{font-size:24px;font-weight:600}
.dash-card .sub{font-size:12px;color:var(--text2);margin-top:4px}
/* Channels */
.channels{padding:20px;overflow-y:auto}
.channel-list{display:flex;flex-direction:column;gap:12px}
.channel-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;justify-content:space-between;align-items:center}
.channel-info h4{font-size:14px;margin-bottom:4px}
.channel-info .sub{font-size:12px;color:var(--text2)}
.channel-badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:500}
.channel-badge.ok{background:rgba(34,197,94,0.15);color:var(--success)}
.channel-badge.error{background:rgba(239,68,68,0.15);color:var(--error)}
/* Mobile */
@media(max-width:768px){
  .header{padding:10px 14px}
  .header h1{font-size:16px}
  .messages{padding:12px 14px}
  .msg{max-width:90%}
  .input-area{padding:10px 14px}
  .dash-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="authOverlay" class="auth-overlay" style="display:none">
  <div class="auth-box">
    <h2>EndiorBot</h2>
    <p>Enter your access token to continue.</p>
    <div id="authError" class="auth-error"></div>
    <input type="password" id="authInput" placeholder="Access token" autocomplete="off">
    <button onclick="doAuth()">Sign In</button>
  </div>
</div>

<div class="header">
  <div class="logo">
    <span id="statusDot" class="status-dot disconnected"></span>
    <h1>EndiorBot</h1>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('chat')" id="tabChat">Chat</button>
    <button class="tab" onclick="switchTab('dashboard')" id="tabDash">Dashboard</button>
    <button class="tab" onclick="switchTab('channels')" id="tabChannels">Channels</button>
  </div>
</div>

<div id="panelChat" class="panel active">
  <div class="messages" id="messages"></div>
  <div class="typing" id="typing">EndiorBot is thinking...</div>
  <form class="input-area" onsubmit="sendMsg();return false">
    <textarea id="msgInput" rows="1" placeholder="Type a message..."></textarea>
    <button type="submit" id="sendBtn" disabled>Send</button>
  </form>
</div>

<div id="panelDash" class="panel">
  <div class="dashboard">
    <div class="dash-grid" id="dashGrid">
      <div class="dash-card"><h3>Status</h3><div class="value" id="dConn">--</div><div class="sub">Connection</div></div>
      <div class="dash-card"><h3>Active Sessions</h3><div class="value" id="dSessions">--</div><div class="sub">WebSocket connections</div></div>
      <div class="dash-card"><h3>Uptime</h3><div class="value" id="dUptime">--</div><div class="sub">Server uptime</div></div>
      <div class="dash-card"><h3>Version</h3><div class="value" id="dVersion">--</div><div class="sub">Server version</div></div>
    </div>
  </div>
</div>

<div id="panelChannels" class="panel">
  <div class="channels">
    <div class="channel-list" id="channelList">
      <div class="channel-item">
        <div class="channel-info">
          <h4>Telegram</h4>
          <div class="sub">@Endior_bot</div>
        </div>
        <span class="channel-badge ok" id="chTelegram">Ready</span>
      </div>
      <div class="channel-item">
        <div class="channel-info">
          <h4>Zalo Bot</h4>
          <div class="sub">Bot Endior</div>
        </div>
        <span class="channel-badge ok" id="chZalo">Ready</span>
      </div>
      <div class="channel-item">
        <div class="channel-info">
          <h4>Web</h4>
          <div class="sub">Browser interface</div>
        </div>
        <span class="channel-badge ok" id="chWeb">Connected</span>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  let ws=null, connected=false, waitingResponse=false;
  let reconnectDelay=1000;
  const maxReconnectDelay=30000;
  let msgId=0;

  // Sprint 99: Persistent clientId for per-chat workspace + history
  let clientId=localStorage.getItem('endiorbot-client-id');
  if(!clientId){clientId='web-'+Math.random().toString(36).slice(2,10);localStorage.setItem('endiorbot-client-id',clientId)}

  const $=id=>document.getElementById(id);
  const msgArea=$('messages'), input=$('msgInput'), sendBtn=$('sendBtn');
  const typingEl=$('typing'), statusDot=$('statusDot');
  const authOverlay=$('authOverlay'), authInput=$('authInput'), authError=$('authError');

  function init(){
    // Check if auth is required
    const authRequired = window.ENDIORBOT_AUTH_REQUIRED;
    if(authRequired){
      authOverlay.style.display='flex';
      authInput.focus();
    } else {
      connect();
    }
  }

  window.doAuth=function(){
    const token=authInput.value.trim();
    if(!token)return;
    authError.style.display='none';
    // Store token and connect
    window.AUTH_TOKEN = token;
    authOverlay.style.display='none';
    connect();
  };

  authInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doAuth()}});

  function connect(){
    if(ws&&(ws.readyState===0||ws.readyState===1))return;
    const proto=location.protocol==='https:'?'wss:':'ws:';
    const wsUrl = proto+'//'+location.host+'/ws';
    ws=new WebSocket(wsUrl);

    ws.onopen=()=>{
      connected=true;
      reconnectDelay=1000;
      statusDot.className='status-dot connected';
      sendBtn.disabled=false;
      addMsg('system','Connected to EndiorBot Gateway');
      $('chWeb').textContent='Connected';
      $('chWeb').className='channel-badge ok';
    };

    ws.onmessage=e=>{
      try{const d=JSON.parse(e.data);handleMsg(d)}catch(err){console.error(err)}
    };

    ws.onclose=()=>{
      connected=false;
      statusDot.className='status-dot disconnected';
      sendBtn.disabled=true;
      $('chWeb').textContent='Disconnected';
      $('chWeb').className='channel-badge error';
      if(waitingResponse){waitingResponse=false;typingEl.style.display='none'}
      setTimeout(()=>{
        reconnectDelay=Math.min(reconnectDelay*2,maxReconnectDelay);
        connect();
      },reconnectDelay);
    };

    ws.onerror=()=>{};
  }

  function handleMsg(d){
    // JSON-RPC 2.0 format
    if(d.jsonrpc==='2.0'){
      if(d.method==='welcome'){
        $('dVersion').textContent=d.params?.serverVersion||'1.0.0';
        return;
      }
      if(d.method==='message'||d.method==='response'){
        waitingResponse=false;
        typingEl.style.display='none';
        addMsg('bot',d.params?.content||d.params?.text||JSON.stringify(d.params));
        return;
      }
      if(d.result){
        waitingResponse=false;
        typingEl.style.display='none';
        let text='';
        if(typeof d.result==='string'){
          text=d.result;
        }else if(d.result.text||d.result.content){
          text=d.result.text||d.result.content;
        }else{
          text=JSON.stringify(d.result,null,2);
        }
        // Sprint 99: Show metadata (agent, model, latencyMs) from Ingress pipeline
        let meta='';
        if(d.result.agent||d.result.model||d.result.latencyMs){
          const parts=[];
          if(d.result.agent)parts.push('@'+d.result.agent);
          if(d.result.model)parts.push(d.result.model);
          if(d.result.latencyMs)parts.push(d.result.latencyMs+'ms');
          meta=' ['+parts.join(' | ')+']';
        }
        addMsg('bot',text);
        if(meta)addMsg('system',meta);
        return;
      }
      if(d.error){
        waitingResponse=false;
        typingEl.style.display='none';
        addMsg('system','Error: '+(d.error.message||JSON.stringify(d.error)));
        return;
      }
    }
    // Legacy format
    if(d.type==='message'){
      waitingResponse=false;
      typingEl.style.display='none';
      addMsg('bot',d.content||'');
    }
  }

  window.sendMsg=function(){
    const text=input.value.trim();
    if(!text||!connected)return;

    // Send as JSON-RPC 2.0 — web channel uses router.chat for full AI pipeline
    const rpc={
      jsonrpc:'2.0',
      method:'router.chat',
      params:{message:text, senderId:clientId, chatId:'web-'+clientId},
      id:++msgId
    };
    ws.send(JSON.stringify(rpc));
    addMsg('user',text);
    input.value='';
    autoResize();
    waitingResponse=true;
    typingEl.style.display='block';
    msgArea.scrollTop=msgArea.scrollHeight;
  };

  function addMsg(role,content){
    const div=document.createElement('div');
    div.className='msg '+role;
    div.innerHTML=safeMarkdown(content);
    msgArea.appendChild(div);
    msgArea.scrollTop=msgArea.scrollHeight;
  }

  function safeMarkdown(text){
    if(typeof text!=='string')text=String(text);
    let s=text.replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
    // Fenced code blocks
    s=s.replace(/```([\s\S]*?)```/g,(_,c)=>'<pre><code>'+c+'</code></pre>');
    // Inline code
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    // Bold
    s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    // Italic
    s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
    // Line breaks
    s=s.replace(/\n/g,'<br>');
    return s;
  }

  // Textarea auto-resize
  input.addEventListener('input',autoResize);
  function autoResize(){input.style.height='auto';input.style.height=Math.min(input.scrollHeight,120)+'px'}

  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}
  });

  // Tab switching
  window.switchTab=function(tab){
    const tabMap={chat:'Chat',dashboard:'Dash',channels:'Channels'};
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    const panelId='panel'+tabMap[tab];
    const tabId='tab'+tabMap[tab];
    const panel=$(panelId);
    const tabEl=$(tabId);
    if(panel)panel.classList.add('active');
    if(tabEl)tabEl.classList.add('active');
    if(tab==='dashboard'){
      updateDashboard();
    }
  };

  function updateDashboard(){
    $('dConn').textContent=connected?'Connected':'Disconnected';
    $('dConn').style.color=connected?'var(--success)':'var(--error)';
    if(connected&&ws){
      // Fetch real stats via JSON-RPC
      const statsId=++msgId;
      const verId=++msgId;
      const pending=new Map();
      const handler=e=>{
        try{
          const d=JSON.parse(e.data);
          if(d.id===statsId&&d.result){
            $('dSessions').textContent=String(d.result.activeConnections??0);
            const sec=d.result.uptimeSec||0;
            const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
            $('dUptime').textContent=h>0?h+'h '+m+'m':m>0?m+'m '+s+'s':s+'s';
          }
          if(d.id===verId&&d.result){
            $('dVersion').textContent=d.result.gateway||'1.0.0';
          }
          pending.delete(d.id);
          if(pending.size===0)ws.removeEventListener('message',handler);
        }catch{}
      };
      ws.addEventListener('message',handler);
      pending.set(statsId,1);pending.set(verId,1);
      ws.send(JSON.stringify({jsonrpc:'2.0',method:'system.stats',id:statsId}));
      ws.send(JSON.stringify({jsonrpc:'2.0',method:'system.version',id:verId}));
    }else{
      $('dSessions').textContent='0';
      $('dUptime').textContent='--';
    }
  }

  init();
})();
</script>
</body>
</html>
