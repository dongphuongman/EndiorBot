<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Endiorbot — Desktop &amp; Web UI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="app-styles.css"/>

<style>
  body {
    background: #f0eee9;
    margin: 0;
  }
  .frame-window {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(20,18,14,.18), 0 4px 16px rgba(0,0,0,.08);
    background: var(--bg);
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .frame-titlebar {
    flex-shrink: 0;
    height: 30px;
    background: linear-gradient(180deg, #2a2a2e 0%, #1d1d20 100%);
    border-bottom: 1px solid rgba(0,0,0,.4);
    display: flex; align-items: center; padding: 0 12px;
    gap: 8px;
  }
  .frame-titlebar .dot-tl {
    width: 12px; height: 12px; border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,.2);
  }
  .frame-titlebar .dot-tl.r { background: #ff5f57; }
  .frame-titlebar .dot-tl.y { background: #febc2e; }
  .frame-titlebar .dot-tl.g { background: #28c840; }
  .frame-titlebar .titlebar-title {
    flex: 1; text-align: center;
    font-family: var(--font-sans);
    font-size: 12px; color: rgba(255,255,255,.55);
    font-weight: 500;
  }
  .frame-titlebar.browser {
    height: 64px;
    flex-direction: column;
    padding: 0;
    background: linear-gradient(180deg, #2a2a2e 0%, #1d1d20 100%);
  }
  .frame-titlebar.browser .row1 {
    height: 30px;
    display: flex; align-items: center;
    padding: 0 12px; gap: 8px;
    width: 100%; box-sizing: border-box;
    border-bottom: 1px solid rgba(0,0,0,.3);
  }
  .frame-titlebar.browser .row2 {
    height: 34px;
    display: flex; align-items: center;
    padding: 0 12px; gap: 10px;
    width: 100%; box-sizing: border-box;
  }
  .frame-titlebar.browser .url-bar {
    flex: 1;
    height: 22px;
    background: #0d0d0f;
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 6px;
    padding: 0 10px;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: rgba(255,255,255,.7);
  }
  .frame-titlebar.browser .url-bar .lock { color: #6ee787; }
  .frame-titlebar.browser .nav-btn {
    color: rgba(255,255,255,.5);
    font-size: 14px;
    cursor: default;
    width: 18px;
    text-align: center;
  }
  .frame-body { flex: 1; overflow: hidden; }
</style>
</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data -->
<script src="app-data.js"></script>

<!-- Canvas + tweaks -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- App pieces -->
<script type="text/babel" src="app-ui.jsx"></script>
<script type="text/babel" src="app-pages.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel" src="webui-app.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "en",
  "showDesktop": true,
  "showWebUI": true,
  "desktopPage": "dashboard"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const lang = tweaks.lang || "en";

  const labels = {
    en: {
      sec_desktop: "Desktop App",
      sec_desktop_sub: "Electron client · 7 pages, sidebar nav, gateway auto-start",
      sec_webui: "Web UI",
      sec_webui_sub: "Browser chat at localhost:18790 · same agents, lighter surface",
      art_desktop: "Endiorbot Desktop · macOS",
      art_webui: "Endiorbot Web UI · Browser",
    },
    vi: {
      sec_desktop: "Ứng dụng Desktop",
      sec_desktop_sub: "Electron client · 7 trang, sidebar, tự khởi động gateway",
      sec_webui: "Web UI",
      sec_webui_sub: "Chat trên trình duyệt ở localhost:18790 · cùng agent, giao diện gọn hơn",
      art_desktop: "Endiorbot Desktop · macOS",
      art_webui: "Endiorbot Web UI · Trình duyệt",
    }
  };
  const L = labels[lang];

  return (
    <React.Fragment>
      <DesignCanvas>
        {tweaks.showDesktop && (
          <DCSection id="desktop" title={L.sec_desktop} subtitle={L.sec_desktop_sub}>
            <DCArtboard id="desktop-app" label={L.art_desktop} width={1280} height={820}>
              <div className="frame-window">
                <div className="frame-titlebar">
                  <div className="dot-tl r"/>
                  <div className="dot-tl y"/>
                  <div className="dot-tl g"/>
                  <div className="titlebar-title">{window.EB_APP[lang].ui.window_title}</div>
                  <div style={{width: 50}}/>
                </div>
                <div className="frame-body">
                  <DesktopApp lang={lang}/>
                </div>
              </div>
            </DCArtboard>
          </DCSection>
        )}

        {tweaks.showWebUI && (
          <DCSection id="webui" title={L.sec_webui} subtitle={L.sec_webui_sub}>
            <DCArtboard id="webui-app" label={L.art_webui} width={1180} height={780}>
              <div className="frame-window">
                <div className="frame-titlebar browser">
                  <div className="row1">
                    <div className="dot-tl r"/>
                    <div className="dot-tl y"/>
                    <div className="dot-tl g"/>
                    <div style={{flex:1}}/>
                  </div>
                  <div className="row2">
                    <span className="nav-btn">‹</span>
                    <span className="nav-btn">›</span>
                    <span className="nav-btn">↻</span>
                    <div className="url-bar">
                      <span className="lock">🔒</span>
                      <span>localhost:18790</span>
                      <span style={{flex:1}}/>
                      <span style={{color:"rgba(255,255,255,.4)"}}>⋯</span>
                    </div>
                    <span className="nav-btn">⊕</span>
                  </div>
                </div>
                <div className="frame-body">
                  <WebUIApp lang={lang}/>
                </div>
              </div>
            </DCArtboard>
          </DCSection>
        )}
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Language">
          <TweakRadio
            label="Locale"
            value={tweaks.lang}
            onChange={(v)=>setTweak('lang', v)}
            options={[
              { value: "en", label: "English" },
              { value: "vi", label: "Tiếng Việt" },
            ]}
          />
        </TweakSection>
        <TweakSection title="Surfaces">
          <TweakToggle label="Desktop app" value={tweaks.showDesktop} onChange={(v)=>setTweak('showDesktop', v)}/>
          <TweakToggle label="Web UI" value={tweaks.showWebUI} onChange={(v)=>setTweak('showWebUI', v)}/>
        </TweakSection>
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
